<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixel Art Simples</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Pixel Art Simples</h1>

  <div class="toolbar">
    <input type="color" id="colorPicker" value="#000000" />
    <button onclick="setTool('paint')">Pincel</button>
    <button onclick="setTool('erase')">Borracha</button>
    <button onclick="clearGrid()">Limpar</button>
    <button onclick="saveImage()">Salvar</button>
  </div>

  <canvas id="pixelCanvas" width="320" height="320"></canvas>

  <script src="script.js"></script>
</body>
</html>
